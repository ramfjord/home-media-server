objectives:
  - downloading
  - streaming
  - monitoring

# Base paths (can be overridden in config.local.yml)
install_base: /opt/mediaserver
media_path: /data
hostname: localhost

services:
- name: wireguard
  partof: vpn
  desc: VPN container
  image: lscr.io/linuxserver/wireguard:latest
  is_vpn_gateway: true
  volumes:
    - ${install_base}/config/wireguard:/config
    - /lib/modules:/lib/modules:ro

- name: radarr
  partof: downloading
  desc: find movies
  port: 7878
  dockerized: true
  image: lscr.io/linuxserver/radarr:latest
  volumes:
    - ${install_base}/config/radarr:/config
    - ${media_path}:/data

- name: sonarr
  partof: downloading
  desc: find new shows
  port: 8989
  dockerized: true
  image: lscr.io/linuxserver/sonarr:latest
  volumes:
    - ${install_base}/config/sonarr:/config
    - ${media_path}:/data

- name: prowlarr
  partof: downloading
  desc: indexer manager
  port: 9696
  dockerized: true
  image: lscr.io/linuxserver/prowlarr:latest
  volumes:
    - ${install_base}/config/prowlarr:/config

- name: qbittorrent
  partof: downloading
  desc: torrent client
  port: 8080
  image: lscr.io/linuxserver/qbittorrent:latest
  uses_vpn: true
  dockerized: true
  volumes:
    - ${install_base}/config/qbittorrent:/config
    - ${media_path}:/data

- name: plex
  partof: streaming
  unit: plexmediaserver
  desc: Media streaming
  port: 32400
  healthz: /web/index.html

- name: homer
  partof: dashboard
  desc: Service dashboard
  port: 8000
  container_port: 8080
  dockerized: true
  image: b4bz/homer:latest
  volumes:
    - ${install_base}/config/homer:/www/assets:ro

- name: prometheus
  partof: monitoring
  desc: Metrics and alerting
  port: 9090

- name: alertmanager
  partof: monitoring
  desc: Alert management
  port: 9093
  dockerized: true
  image: prom/alertmanager:latest
  volumes:
    - ${install_base}/config/alertmanager:/etc/alertmanager:ro

- name: grafana
  partof: monitoring
  desc: Dashboards and visualization
  port: 3000
  dockerized: true
  image: grafana/grafana:latest
  volumes:
    - ${install_base}/config/grafana:/var/lib/grafana
    - ${install_base}/config/grafana/grafana.ini:/etc/grafana/grafana.ini:ro
