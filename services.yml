- name: alertmanager
  partof: monitoring
  desc: Alert management
  port: 9093
  healthz: /-/healthy
  sighup_reload: true
  docker_config:
    image: prom/alertmanager:latest
    volumes:
      - ${install_base}/config/alertmanager:/etc/alertmanager:ro
    labels:
      prometheus.io/scrape: "true"
      prometheus.io/port: "9093"
    restart: unless-stopped

- name: grafana
  partof: monitoring
  desc: Dashboards and visualization
  port: 3000
  healthz: /api/health
  sighup_reload: true
  docker_config:
    image: grafana/grafana:latest
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - ${install_base}/config/grafana:/var/lib/grafana
      - ${install_base}/config/grafana/grafana.ini:/etc/grafana/grafana.ini:ro
      - ${install_base}/config/grafana/provisioning/dashboards:/var/lib/grafana/provisioning/dashboards
      - ${install_base}/config/grafana/provisioning/datasources:/var/lib/grafana/provisioning/datasources
    labels:
      prometheus.io/scrape: "true"
      prometheus.io/port: "3000"
    restart: unless-stopped

- name: cadvisor
  partof: monitoring
  desc: Container metrics exporter
  port: 8081
  healthz: /api/v1/machine
  docker_config:
    image: gcr.io/cadvisor/cadvisor:latest
    ports:
      - 8081:8080
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    privileged: true
    devices:
      - /dev/kmsg
    labels:
      prometheus.io/scrape: "true"
      prometheus.io/port: "8080"
    restart: unless-stopped

- name: otelcol
  partof: monitoring
  desc: OpenTelemetry metrics collector
  port: 8888
  groups: [docker]
  docker_config:
    image: otel/opentelemetry-collector-contrib:latest
    command:
      - --config=/etc/otelcol/otelcol-config.yaml
    volumes:
      - ${install_base}/config/otelcol:/etc/otelcol:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

- name: exportarr-radarr
  partof: monitoring
  desc: Radarr metrics exporter
  docker_config:
    image: ghcr.io/onedr0p/exportarr:latest
    command:
      - radarr
      - --url
      - http://caddy:7878
      - --api-key
      - ${radarr_apikey}
      - --port
      - "9144"
    labels:
      prometheus.io/scrape: "true"
      prometheus.io/port: "9144"
    restart: unless-stopped

- name: exportarr-sonarr
  partof: monitoring
  desc: Sonarr metrics exporter
  docker_config:
    image: ghcr.io/onedr0p/exportarr:latest
    command:
      - sonarr
      - --url
      - http://caddy:8989
      - --api-key
      - ${sonarr_apikey}
      - --port
      - "9145"
    labels:
      prometheus.io/scrape: "true"
      prometheus.io/port: "9145"
    restart: unless-stopped

- name: qbittorrent-exporter
  partof: monitoring
  desc: qBittorrent metrics exporter
  docker_config:
    image: esanchezm/prometheus-qbittorrent-exporter:latest
    environment:
      - QBITTORRENT_HOST=qbittorrent
      - QBITTORRENT_PORT=8080
      - QBITTORRENT_USERNAME=${qbittorrent_username}
      - QBITTORRENT_PASSWORD=${qbittorrent_password}
    labels:
      prometheus.io/scrape: "true"
      prometheus.io/port: "8000"
    restart: unless-stopped
