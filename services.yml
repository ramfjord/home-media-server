objectives:
  - downloading
  - streaming
  - monitoring

# Base paths (can be overridden in config.local.yml)
install_base: /opt/mediaserver
media_path: /data
hostname: localhost

services:
- name: wireguard

  partof: vpn
  desc: VPN container
  docker_config:
    image: lscr.io/linuxserver/wireguard:latest
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    sysctls:
      net.ipv4.conf.all.src_valid_mark: 1
    volumes:
      - ${install_base}/config/wireguard:/config
      - /lib/modules:/lib/modules:ro
    ports:
      - "8080:8080"
    healthcheck:
      test: ping -c 1 1.1.1.1 || exit 1
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped

- name: radarr
  partof: downloading
  desc: find movies
  port: 7878
  docker_config:
    image: lscr.io/linuxserver/radarr:latest
    volumes:
      - ${install_base}/config/radarr:/config
      - ${media_path}:/data
    restart: unless-stopped

- name: sonarr
  partof: downloading
  desc: find new shows
  port: 8989
  docker_config:
    image: lscr.io/linuxserver/sonarr:latest
    volumes:
      - ${install_base}/config/sonarr:/config
      - ${media_path}:/data
    restart: unless-stopped

- name: prowlarr
  partof: downloading
  desc: indexer manager
  port: 9696
  docker_config:
    image: lscr.io/linuxserver/prowlarr:latest
    volumes:
      - ${install_base}/config/prowlarr:/config
    restart: unless-stopped

- name: qbittorrent
  partof: downloading
  desc: torrent client
  port: 8080
  docker_config:
    image: lscr.io/linuxserver/qbittorrent:latest
    volumes:
      - ${install_base}/config/qbittorrent:/config
      - ${media_path}:/data
    network_mode: "service:wireguard"
    ports: []
    restart: unless-stopped
    depends_on:
      wireguard:
        condition: service_healthy

- name: plex
  partof: streaming
  unit: plexmediaserver
  desc: Media streaming
  port: 32400
  healthz: /web/index.html

- name: homer
  partof: dashboard
  desc: Service dashboard
  port: 80
  docker_config:
    image: b4bz/homer:latest
    ports:
      - 80:8080
    volumes:
      - ${install_base}/config/homer:/www/assets:ro
    restart: unless-stopped

- name: prometheus
  partof: monitoring
  desc: Metrics and alerting
  port: 9090
  healthz: /-/healthy
  docker_config:
    image: prom/prometheus:latest
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --web.external-url=http://${hostname}:9090/
      - --web.enable-remote-write-receiver
    volumes:
      - ${install_base}/config/prometheus:/etc/prometheus:ro
      - ${install_base}/config/prometheus/data:/prometheus/data
    labels:
      prometheus.io/scrape: "true"
      prometheus.io/port: "9090"
    restart: unless-stopped

- name: blackbox-exporter
  partof: monitoring
  desc: Blackbox HTTP probe exporter
  port: 9115
  docker_config:
    image: prom/blackbox-exporter:latest
    command:
      - --config.file=/etc/blackbox-exporter/blackbox.yml
    volumes:
      - ${install_base}/config/prometheus/blackbox.yml:/etc/blackbox-exporter/blackbox.yml:ro
    labels:
      prometheus.io/scrape: "true"
      prometheus.io/port: "9115"
    restart: unless-stopped

- name: alertmanager
  partof: monitoring
  desc: Alert management
  port: 9093
  healthz: /-/healthy
  docker_config:
    image: prom/alertmanager:latest
    volumes:
      - ${install_base}/config/alertmanager:/etc/alertmanager:ro
    labels:
      prometheus.io/scrape: "true"
      prometheus.io/port: "9093"
    restart: unless-stopped

- name: grafana
  partof: monitoring
  desc: Dashboards and visualization
  port: 3000
  healthz: /api/health
  docker_config:
    image: grafana/grafana:latest
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - ${install_base}/config/grafana:/var/lib/grafana
      - ${install_base}/config/grafana/grafana.ini:/etc/grafana/grafana.ini:ro
      - ${install_base}/config/grafana/provisioning/dashboards:/var/lib/grafana/provisioning/dashboards
      - ${install_base}/config/grafana/provisioning/datasources:/var/lib/grafana/provisioning/datasources
    labels:
      prometheus.io/scrape: "true"
      prometheus.io/port: "3000"
    restart: unless-stopped

- name: cadvisor
  partof: monitoring
  desc: Container metrics exporter
  port: 8081
  healthz: /api/v1/machine
  docker_config:
    image: gcr.io/cadvisor/cadvisor:latest
    ports:
      - 8081:8080
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    privileged: true
    devices:
      - /dev/kmsg
    labels:
      prometheus.io/scrape: "true"
      prometheus.io/port: "8080"
    restart: unless-stopped

- name: otelcol
  partof: monitoring
  desc: OpenTelemetry metrics collector
  port: 8888
  groups: [docker]
  docker_config:
    image: otel/opentelemetry-collector-contrib:latest
    command:
      - --config=/etc/otelcol/otelcol-config.yaml
    volumes:
      - ${install_base}/config/otelcol:/etc/otelcol:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
