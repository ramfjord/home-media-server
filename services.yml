objectives:
  - downloading
  - streaming
  - monitoring

# Base paths (can be overridden in config.local.yml)
install_base: /opt/mediaserver
media_path: /data

services:
- name: wireguard
  partof: vpn
  desc: VPN container
  image: lscr.io/linuxserver/wireguard:latest
  is_vpn_gateway: true
  volumes:
    - ${install_base}/config/wireguard:/config
    - /lib/modules:/lib/modules:ro

- name: radarr
  partof: downloading
  desc: find movies
  port: 7878
  image: lscr.io/linuxserver/radarr:latest
  uses_vpn: true
  volumes:
    - ${install_base}/config/radarr:/config
    - ${media_path}:/data

- name: sonarr
  partof: downloading
  desc: find new shows
  port: 8989
  image: lscr.io/linuxserver/sonarr:latest
  uses_vpn: true
  volumes:
    - ${install_base}/config/sonarr:/config
    - ${media_path}:/data

- name: prowlarr
  partof: downloading
  desc: indexer manager
  port: 9696
  image: lscr.io/linuxserver/prowlarr:latest
  uses_vpn: true
  volumes:
    - ${install_base}/config/prowlarr:/config

- name: qbittorrent
  partof: downloading
  desc: torrent client
  port: 8080
  image: lscr.io/linuxserver/qbittorrent:latest
  uses_vpn: true
  volumes:
    - ${install_base}/config/qbittorrent:/config
    - ${media_path}:/data

- name: plex
  partof: streaming
  unit: plexmediaserver
  desc: Media streaming
  port: 32400
  healthz: /web/index.html
