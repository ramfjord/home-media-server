objectives:
  - downloading
  - streaming
  - monitoring

# Base paths (can be overridden in config.local.yml)
install_base: /opt/mediaserver
media_path: /data
hostname: localhost

services:
- name: wireguard

  partof: vpn
  desc: VPN container
  docker_config:
    image: lscr.io/linuxserver/wireguard:latest
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    sysctls:
      net.ipv4.conf.all.src_valid_mark: 1
    volumes:
      - ${install_base}/config/wireguard:/config
      - /lib/modules:/lib/modules:ro
    healthcheck:
      test: ping -c 1 1.1.1.1 || exit 1
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped

- name: caddy
  partof: dashboard
  desc: Reverse proxy for VPN services
  sighup_reload: true
  docker_config:
    image: caddy:latest
    volumes:
      - ${install_base}/config/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
    ports:
      - "8080:8080"
      - "7878:7878"
      - "8989:8989"
      - "9696:9696"
    restart: unless-stopped

- name: radarr
  partof: downloading
  desc: find movies
  port: 7878
  use_vpn: true
  groups: [mediaserver]
  docker_config:
    image: lscr.io/linuxserver/radarr:latest
    volumes:
      - ${install_base}/config/radarr:/config
      - ${media_path}:/data
    restart: unless-stopped

- name: sonarr
  partof: downloading
  desc: find new shows
  port: 8989
  use_vpn: true
  groups: [mediaserver]
  docker_config:
    image: lscr.io/linuxserver/sonarr:latest
    volumes:
      - ${install_base}/config/sonarr:/config
      - ${media_path}:/data
    restart: unless-stopped

- name: prowlarr
  partof: downloading
  desc: indexer manager
  port: 9696
  use_vpn: true
  docker_config:
    image: lscr.io/linuxserver/prowlarr:latest
    volumes:
      - ${install_base}/config/prowlarr:/config
    restart: unless-stopped

- name: qbittorrent
  partof: downloading
  desc: torrent client
  port: 8080
  use_vpn: true
  groups: [mediaserver]
  docker_config:
    image: lscr.io/linuxserver/qbittorrent:latest
    volumes:
      - ${install_base}/config/qbittorrent:/config
      - ${media_path}:/data
    restart: unless-stopped

- name: plex
  partof: streaming
  unit: plexmediaserver
  desc: Media streaming
  groups: [mediaserver]
  port: 32400
  healthz: /web/index.html

- name: jellyfin
  partof: streaming
  desc: Alternative media streaming server
  port: 8096
  groups: [mediaserver]
  healthz: /health
  docker_config:
    image: jellyfin/jellyfin:latest
    volumes:
      - ${install_base}/config/jellyfin:/config
      - ${media_path}/TV:/media/TV:ro
      - ${media_path}/Movies:/media/Movies:ro
      - /tmp:/tmp
    environment:
      - JELLYFIN_PublishedServerUrl=http://${hostname}:8096
    restart: unless-stopped

- name: homer
  partof: dashboard
  desc: Service dashboard
  port: 80
  docker_config:
    image: b4bz/homer:latest
    ports:
      - 80:8080
    volumes:
      - ${install_base}/config/homer:/www/assets
    restart: unless-stopped

- name: prometheus
  partof: monitoring
  desc: Metrics and alerting
  port: 9090
  healthz: /-/healthy
  sighup_reload: true
  docker_config:
    image: prom/prometheus:latest
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --web.external-url=http://${hostname}:9090/
      - --web.enable-remote-write-receiver
    volumes:
      - ${install_base}/config/prometheus:/etc/prometheus:ro
      - ${install_base}/config/prometheus/data:/prometheus/data
    labels:
      prometheus.io/scrape: "true"
      prometheus.io/port: "9090"
    restart: unless-stopped

- name: blackbox-exporter
  partof: monitoring
  desc: Blackbox HTTP probe exporter
  port: 9115
  docker_config:
    image: prom/blackbox-exporter:latest
    command:
      - --config.file=/etc/blackbox-exporter/blackbox.yml
    volumes:
      - ${install_base}/config/prometheus/blackbox.yml:/etc/blackbox-exporter/blackbox.yml:ro
    labels:
      prometheus.io/scrape: "true"
      prometheus.io/port: "9115"
    restart: unless-stopped

# Disabled until Synology NAS SNMP is configured. To enable:
#   1. DSM -> Control Panel -> Terminal & SNMP -> enable SNMPv3, set creds
#   2. Add snmp_host / snmp_username / snmp_auth_password / snmp_priv_password
#      to config.local.yml
#   3. Uncomment this block and the SNMP scrape job in
#      otelcol/otelcol-config.yaml.erb
#   4. make all && make check && make install && make deploy-snmp-exporter
#
# - name: snmp-exporter
#   partof: monitoring
#   desc: SNMP exporter (Synology NAS metrics)
#   port: 9116
#   docker_config:
#     image: prom/snmp-exporter:latest
#     command:
#       - --config.file=/etc/snmp_exporter/snmp.yml
#     volumes:
#       - ${install_base}/config/prometheus/snmp.yml:/etc/snmp_exporter/snmp.yml:ro
