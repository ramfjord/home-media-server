objectives:
  - downloading
  - streaming
  - monitoring

# Base paths (can be overridden in config.local.yml)
install_base: /opt/mediaserver
media_path: /data
hostname: localhost

services:
- name: wireguard
  partof: vpn
  desc: VPN container
  is_vpn_gateway: true
  docker_config:
    image: lscr.io/linuxserver/wireguard:latest
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    sysctls:
      net.ipv4.conf.all.src_valid_mark: 1
    volumes:
      - ${install_base}/config/wireguard:/config
      - /lib/modules:/lib/modules:ro
    healthcheck:
      test: ping -c 1 1.1.1.1 || exit 1
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped

- name: radarr
  partof: downloading
  desc: find movies
  port: 7878
  docker_config:
    image: lscr.io/linuxserver/radarr:latest
    volumes:
      - ${install_base}/config/radarr:/config
      - ${media_path}:/data
    restart: unless-stopped

- name: sonarr
  partof: downloading
  desc: find new shows
  port: 8989
  docker_config:
    image: lscr.io/linuxserver/sonarr:latest
    volumes:
      - ${install_base}/config/sonarr:/config
      - ${media_path}:/data
    restart: unless-stopped

- name: prowlarr
  partof: downloading
  desc: indexer manager
  port: 9696
  docker_config:
    image: lscr.io/linuxserver/prowlarr:latest
    volumes:
      - ${install_base}/config/prowlarr:/config
    restart: unless-stopped

- name: qbittorrent
  partof: downloading
  desc: torrent client
  port: 8080
  docker_config:
    image: lscr.io/linuxserver/qbittorrent:latest
    volumes:
      - ${install_base}/config/qbittorrent:/config
      - ${media_path}:/data
    cap_add:
      - NET_ADMIN
    entrypoint: /config/entrypoint.sh
    restart: unless-stopped

- name: plex
  partof: streaming
  unit: plexmediaserver
  desc: Media streaming
  port: 32400
  healthz: /web/index.html

- name: homer
  partof: dashboard
  desc: Service dashboard
  port: 8000
  docker_config:
    image: b4bz/homer:latest
    ports:
      - 8000:8080
    volumes:
      - ${install_base}/config/homer:/www/assets:ro
    restart: unless-stopped

- name: prometheus
  partof: monitoring
  desc: Metrics and alerting
  port: 9090

- name: alertmanager
  partof: monitoring
  desc: Alert management
  port: 9093
  docker_config:
    image: prom/alertmanager:latest
    volumes:
      - ${install_base}/config/alertmanager:/etc/alertmanager:ro
    restart: unless-stopped

- name: grafana
  partof: monitoring
  desc: Dashboards and visualization
  port: 3000
  docker_config:
    image: grafana/grafana:latest
    volumes:
      - ${install_base}/config/grafana:/var/lib/grafana
      - ${install_base}/config/grafana/grafana.ini:/etc/grafana/grafana.ini:ro
      - ${install_base}/config/grafana/provisioning/dashboards:/var/lib/grafana/provisioning/dashboards
      - ${install_base}/config/grafana/provisioning/datasources:/var/lib/grafana/provisioning/datasources
    restart: unless-stopped

- name: cadvisor
  partof: monitoring
  desc: Container metrics exporter
  port: 8081
  docker_config:
    image: gcr.io/cadvisor/cadvisor:latest
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    privileged: true
    devices:
      - /dev/kmsg
    restart: unless-stopped
