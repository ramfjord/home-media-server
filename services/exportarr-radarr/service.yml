---
name: exportarr-radarr
partof: downloading
desc: Radarr metrics exporter
scrape_target:
  port: 9144
  service: radarr
docker_config:
  image: ghcr.io/onedr0p/exportarr:latest
  command:
  - radarr
  - "--url"
  - http://caddy:7878
  - "--api-key"
  - "<%= radarr_apikey %>"
  - "--port"
  - '9144'
  restart: unless-stopped
order: 160
