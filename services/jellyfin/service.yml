---
name: jellyfin
partof: streaming
desc: Alternative media streaming server
port: 8096
groups:
- mediaserver
healthz: "/health"
docker_config:
  image: jellyfin/jellyfin:latest
  volumes:
  - "<%= install_base %>/config/jellyfin:/config"
  # Bind /cache (transcodes, fontconfig, thumbnails) so the deploy chown
  # loop reaches it. Without this it lands in an anonymous docker volume
  # whose UID drifts on user_id changes and breaks transcoding.
  - "<%= install_base %>/config/jellyfin/cache:/cache"
  - "<%= media_path %>/TV:/media/TV:ro"
  - "<%= media_path %>/Movies:/media/Movies:ro"
  - "/tmp:/tmp"
  environment:
  - JELLYFIN_PublishedServerUrl=http://<%= hostname %>:8096
  restart: unless-stopped
order: 70
