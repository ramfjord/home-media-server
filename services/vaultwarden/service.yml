---
name: vaultwarden
partof: security
desc: Password manager
port: 80
healthz: "/alive"
user_id: false  # no dedicated host user; image runs as its own internal user
docker_config:
  image: vaultwarden/server:latest
  volumes:
  - "<%= install_base %>/config/vaultwarden:/data"
  environment:
  - LOG_LEVEL=info
  restart: unless-stopped
order: 90
