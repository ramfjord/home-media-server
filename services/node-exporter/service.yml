---
name: node-exporter
partof: monitoring
desc: Host metrics exporter
user: root  # reads /proc and /sys from the host, runs in host network namespace
scrape_target:
  host: host.docker.internal
  port: 9100
  service: operating-system
docker_config:
  image: prom/node-exporter:latest
  network_mode: host
  pid: host
  volumes:
  - "/:/host:ro,rslave"
  command:
  - "--path.rootfs=/host"
  restart: unless-stopped
order: 145
