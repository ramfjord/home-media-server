---
name: fx-caddy
partof: dashboard
desc: Fixture reverse proxy
sighup_reload: true
user_id: 99001
docker_config:
  image: example.invalid/fx-caddy:latest
  volumes:
  - "<%= install_base %>/config/fx-caddy/Caddyfile:/etc/caddy/Caddyfile:ro"
  - "<%= install_base %>/certs:/etc/caddy/certs:ro"
  ports:
  - 18080:18080
  - 18989:18989
  - 19090:19090
  restart: unless-stopped
order: 5
