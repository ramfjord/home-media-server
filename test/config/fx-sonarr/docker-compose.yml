---
services:
  fx-sonarr:
    container_name: fx-sonarr
    environment:
    - TZ=Etc/UTC
    user: ${SVC_UID}
    network_mode: container:wireguard
    image: example.invalid/fx-sonarr:latest
    volumes:
    - /opt/fx-mediaserver/config/fx-sonarr:/config
    - /data:/data
    restart: unless-stopped
...
