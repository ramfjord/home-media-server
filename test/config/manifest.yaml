---
services:
- config_files: false
  has_unit: false
  dockerized: true
  source_dir: services/fx-wireguard
  compose_file: /opt/fx-mediaserver/config/fx-wireguard/docker-compose.yml
  name: fx-wireguard
  partof: vpn
  desc: Fixture VPN container
  user_id: false
  docker_config:
    image: example.invalid/fx-wireguard:latest
    cap_add:
    - NET_ADMIN
    volumes:
    - /opt/fx-mediaserver/config/fx-wireguard:/config
    restart: unless-stopped
  order: 0
- config_files:
  - Caddyfile
  - certs/README.md
  - certs/fullchain.pem
  - certs/privkey.pem
  has_unit: false
  dockerized: true
  source_dir: services/fx-caddy
  compose_file: /opt/fx-mediaserver/config/fx-caddy/docker-compose.yml
  name: fx-caddy
  partof: dashboard
  desc: Fixture reverse proxy (overridden)
  sighup_reload: true
  user_id: 99001
  docker_config:
    image: example.invalid/fx-caddy:overridden
    volumes:
    - /opt/fx-mediaserver/config/fx-caddy/Caddyfile:/etc/caddy/Caddyfile:ro
    - /opt/fx-mediaserver/config/fx-caddy/certs:/etc/caddy/certs:ro
    - /etc/caddy-extra:/etc/caddy/extra:ro
    ports:
    - 18080:18080
    - 18989:18989
    - 19090:19090
    restart: unless-stopped
  order: 5
- config_files: false
  has_unit: false
  dockerized: true
  source_dir: services/fx-sonarr
  compose_file: /opt/fx-mediaserver/config/fx-sonarr/docker-compose.yml
  name: fx-sonarr
  partof: downloading
  desc: Fixture TV indexer (overridden)
  port: 18989
  use_vpn: true
  user_id: 99004
  docker_config:
    image: example.invalid/fx-sonarr:latest
    volumes:
    - /opt/fx-mediaserver/config/fx-sonarr:/config
    - /data:/data
    restart: unless-stopped
  order: 30
- config_files: false
  has_unit: false
  dockerized: true
  source_dir: services/fx-qbittorrent
  compose_file: /opt/fx-mediaserver/config/fx-qbittorrent/docker-compose.yml
  name: fx-qbittorrent
  partof: downloading
  desc: Fixture torrent client
  port: 18080
  use_vpn: true
  user_id: 99003
  docker_config:
    image: example.invalid/fx-qbittorrent:latest
    volumes:
    - /opt/fx-mediaserver/config/fx-qbittorrent:/config
    - /data:/data
    restart: unless-stopped
  order: 50
- config_files:
  - prometheus.yml
  has_unit: false
  dockerized: true
  source_dir: services/fx-prometheus
  compose_file: /opt/fx-mediaserver/config/fx-prometheus/docker-compose.yml
  name: fx-prometheus
  partof: monitoring
  desc: Fixture metrics
  port: 19090
  healthz: /-/healthy
  sighup_reload: true
  user_id: 99002
  docker_config:
    image: example.invalid/fx-prometheus:latest
    command:
    - --config.file=/etc/prometheus/prometheus.yml
    - --web.external-url=http://fx-host:19090/
    volumes:
    - /opt/fx-mediaserver/config/fx-prometheus:/etc/prometheus:ro
    restart: unless-stopped
  order: 100
globals:
  fx_label: fixture-deployment
  install_base: /opt/fx-mediaserver
  media_path: /data
  hostname: fx-host
...
