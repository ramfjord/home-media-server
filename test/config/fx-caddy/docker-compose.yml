---
services:
  fx-caddy:
    container_name: fx-caddy
    environment:
    - TZ=Etc/UTC
    user: ${SVC_UID}
    networks:
    - mediaserver
    image: example.invalid/fx-caddy:overridden
    volumes:
    - /opt/fx-mediaserver/config/fx-caddy/Caddyfile:/etc/caddy/Caddyfile:ro
    - /opt/fx-mediaserver/config/fx-caddy/certs:/etc/caddy/certs:ro
    - /etc/caddy-extra:/etc/caddy/extra:ro
    ports:
    - 18080:18080
    - 18989:18989
    - 19090:19090
    restart: unless-stopped
networks:
  mediaserver:
    external: true
    name: mediaserver
...
